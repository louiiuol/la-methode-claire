name: CI

env:
  NODE_OPTIONS: --max-old-space-size=6144

on:
  push:
    branches:
      - main
    pull_request: {}

jobs:
  build:
    runs-on: unbuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 16
      - run: npm ci
      - run: npm run build

  test:
    runs-on: unbuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 16
      - run: npm ci
      - run: npm run test

  lint:
    runs-on: unbuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 16
      - run: npm ci
      - run: npm run lint

  e2e:
    runs-on: unbuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 16
      - run: npm ci
      - run: npm run build